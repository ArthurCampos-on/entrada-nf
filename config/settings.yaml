# ============================================================
# config/settings.yaml
# Edite este arquivo com seus dados antes de rodar o sistema
# ============================================================
#
# OBS: o agente é executado quando o Chrome JÁ ESTÁ ABERTO
# e o usuário já está logado no NBS (Cloud Service + NBS Shortcut).
# O agente apenas automatiza as operações dentro do sistema.

agendador:
  # Horário do relatório diário automático (formato HH:MM)
  horario_diario: "08:00"

imagens:
  # Pasta onde ficam os recortes dos botões para o sistema reconhecer
  pasta: "imagens"
  # Confiança mínima para considerar que encontrou o elemento (0.0 a 1.0)
  # Diminua para 0.7 se o sistema tiver dificuldade em encontrar elementos
  confianca: 0.7

automacao:
  # Tempo de espera entre ações (segundos)
  # 0.3 → rápido (PC bom, internet boa)
  # 0.5 → padrão recomendado
  # 0.8 → lento (PC lento ou sistema travando)
  delay_acao: 0.3
  # Tempo máximo esperando um elemento aparecer na tela (segundos)
  timeout_elemento: 12
  # Quantas vezes consecutivas o elemento precisa ser detectado para ser
  # considerado válido — evita falsos positivos por flicker de UI
  tentativas: 3

# ── [5] Configurações de negócio ─────────────────────────────────────
# Antes esses valores estavam hardcoded nos arquivos rpa_*.py.
# Agora podem ser alterados aqui sem mexer no código.

empresa:
  # Texto digitado no campo de empresa para filtrar
  nome_filtro: "Duna"
  # Nome completo exibido na lista (usado como referência nos logs)
  nome_completo: "Duna Tubarão"

financeiro:
  # Dias de entrada (prazo inicial do boleto)
  entrada_dias: 60
  # Intervalo entre parcelas (dias)
  intervalo_dias: 60
  # Número total de parcelas
  total_parcelas: 1
  # Tipo de pagamento selecionado no dropdown
  tipo_pagamento: "Boleto Bancario"

locacao:
  # Código de locação padrão digitado no campo Locação
  padrao: "SL"
  # Opção de local selecionada no lançamento de fábrica
  tipo_fabrica: "PRINCIPAL(PEÇAS)"
  # Opção de local selecionada no lançamento de transferência
  tipo_pecas: "PRINCIPAL(PEÇAS)"

logging:
  nivel: "INFO"
  arquivo: "data/logs/nbs_agent.log"

entrada_cte:
  # Dias de entrada do boleto (campo Faturamento)
  faturamento_entrada_dias: 28
  # Intervalo entre parcelas (dias)
  faturamento_intervalo_dias: 28
  # Número de parcelas
  faturamento_parcelas: 1
  # Código de contabilização (aba Contabilização — primeira nota)
  codigo_contabilizacao: "40"
